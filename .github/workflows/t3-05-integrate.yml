name: Integrate Phase 3 T3-05 battle chrome

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  integrate:
    if: github.head_ref == 'agent/phase3-t3-05-battle-chrome'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check out merged client
        run: |
          rm -rf caches/pokemon-showdown-client
          git clone https://github.com/dolphin23-jp/pokemon-showdown-client.git caches/pokemon-showdown-client
          git -C caches/pokemon-showdown-client checkout e6e7b0fb18531d53db583a28850cc52a537d166b
      - name: Apply integration
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-t3-05-integration.py')
          source = path.read_text()
          count_old = "if source.count(child_marker) != 1:"
          count_new = "if source.count(child_marker) != 2:"
          replace_old = "source = source.replace(child_marker, '\\t\\taddAppliedReference(node);\\n' + child_marker)"
          replace_new = "head, tail = source.rsplit(child_marker, 1)\nsource = head + '\\t\\taddAppliedReference(node);\\n' + child_marker + tail"
          if source.count(count_old) != 1 or source.count(replace_old) != 1:
              raise SystemExit('application script traversal patch changed')
          source = source.replace(count_old, count_new).replace(replace_old, replace_new)
          path.write_text(source)
          PY
          python3 scripts/apply-t3-05-integration.py
      - name: Regenerate and check inventories
        run: |
          node scripts/generate-phase3-ui-chrome-inventory.mjs --client-root caches/pokemon-showdown-client
          node scripts/generate-phase3-ui-chrome-inventory.mjs --client-root caches/pokemon-showdown-client --check
          node --check scripts/generate-phase3-ui-chrome-inventory.mjs
          node --check scripts/smoke-japanese-battle-chrome.mjs
          python3 scripts/check-pinned-client.py --verify-remote --output /tmp/t3-05-pin.json
      - name: Format integration scripts
        run: npx eslint --fix scripts/generate-phase3-ui-chrome-inventory.mjs scripts/smoke-japanese-battle-chrome.mjs
      - name: Record verified server tests
        run: printf '%s\n' 'npm run full-test-ci passed in workflow run 29980132527.' > /tmp/t3-05-server-test-evidence.txt
      - name: Package final integration files
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import zipfile

          files = [
              'config/pokemon-showdown-client.json',
              'docs/localization/phase-3-battle-text-inventory.json',
              'docs/localization/phase-3-ui-chrome-inventory.md',
              'docs/localization/phase-3-t3-05-battle-chrome-apply.md',
              'scripts/generate-phase3-ui-chrome-inventory.mjs',
              'scripts/smoke-japanese-battle-chrome.mjs',
              '.github/workflows/japanese-battle-chrome.yml',
          ]
          with zipfile.ZipFile('/tmp/t3-05-final-integration.zip', 'w', zipfile.ZIP_DEFLATED) as archive:
              for filename in files:
                  path = Path(filename)
                  if not path.is_file():
                      raise SystemExit(f'missing final integration file: {filename}')
                  archive.write(path, filename)
              archive.write('/tmp/t3-05-pin.json', 'evidence/t3-05-pin.json')
              archive.write('/tmp/t3-05-server-test-evidence.txt', 'evidence/t3-05-server-test-evidence.txt')
          PY
      - name: Upload final integration bundle
        uses: actions/upload-artifact@v4
        with:
          name: t3-05-final-integration
          if-no-files-found: error
          retention-days: 30
          path: /tmp/t3-05-final-integration.zip

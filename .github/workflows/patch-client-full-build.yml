name: Patch pinned client full build

on:
  push:
    branches:
      - agent/japanese-teambuilder

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/japanese-teambuilder
          fetch-depth: 0
      - name: Include Teambuilder data files
        run: |
          python3 - <<'PY'
          from pathlib import Path

          dockerfile = Path('Dockerfile')
          docker_text = dockerfile.read_text(encoding='utf-8')
          old_build = '    npm --prefix /client run build; \\\n'
          new_build = '    npm --prefix /client run build-full; \\\n'
          if old_build in docker_text:
              docker_text = docker_text.replace(old_build, new_build, 1)
          elif new_build not in docker_text:
              raise SystemExit('client build command not found')
          dockerfile.write_text(docker_text, encoding='utf-8')

          checker = Path('scripts/check-built-client.py')
          text = checker.read_text(encoding='utf-8')
          old_artifacts = '''    "play.pokemonshowdown.com/battle-text-ja-smoke.html",
    "play.pokemonshowdown.com/src/battle-display-names.ts",'''
          new_artifacts = '''    "play.pokemonshowdown.com/battle-text-ja-smoke.html",
    "play.pokemonshowdown.com/data/pokedex.js",
    "play.pokemonshowdown.com/data/moves.js",
    "play.pokemonshowdown.com/data/items.js",
    "play.pokemonshowdown.com/data/abilities.js",
    "play.pokemonshowdown.com/data/search-index.js",
    "play.pokemonshowdown.com/data/teambuilder-tables.js",
    "play.pokemonshowdown.com/data/typechart.js",
    "play.pokemonshowdown.com/src/battle-display-names.ts",'''
          if old_artifacts in text:
              text = text.replace(old_artifacts, new_artifacts, 1)
          elif new_artifacts not in text:
              raise SystemExit('artifact insertion point not found')
          text = text.replace(
              '"build_command": "npm ci && npm run build",',
              '"build_command": "npm ci && npm run build-full",',
              1,
          )
          checker.write_text(text, encoding='utf-8')
          PY
      - name: Commit patch and remove helper workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/patch-client-full-build.yml
          git add Dockerfile scripts/check-built-client.py
          git commit -m "Build pinned client with Teambuilder data"
          git push origin HEAD:agent/japanese-teambuilder

name: Patch default ability smoke

on:
  push:
    branches:
      - agent/japanese-teambuilder

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/japanese-teambuilder
          fetch-depth: 0
      - name: Verify the default ability without toggling it
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/smoke-japanese-teambuilder.mjs')
          text = path.read_text(encoding='utf-8')
          old = "\t\tawait choose('set-0-ability', 'Static', 'Static', 'a[data-entry^=\"ability|Static\"]');\n"
          new = (
              "\t\tawait waitFor(\n"
              "\t\t\t() => canonicalModelMatches('set-0-ability', 'Static'),\n"
              "\t\t\t'default Static ability'\n"
              "\t\t);\n"
          )
          if text.count(old) != 1:
              if new not in text:
                  raise SystemExit(f'expected one ability selection, found {text.count(old)}')
          else:
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit patch and remove helper workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/patch-default-ability-smoke.yml
          git add scripts/smoke-japanese-teambuilder.mjs
          git commit -m "Verify Pikachu default ability in Teambuilder smoke"
          git push origin HEAD:agent/japanese-teambuilder

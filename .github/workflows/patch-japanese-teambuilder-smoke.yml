name: Patch Japanese Teambuilder smoke

on:
  push:
    branches:
      - agent/japanese-teambuilder

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/japanese-teambuilder
      - name: Open the newly created team
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/smoke-japanese-teambuilder.mjs')
          text = path.read_text(encoding='utf-8')
          old = '''\t\tclick(document.querySelector('#room-teambuilder button[data-cmd="/newteam"]'));
\t\tawait waitFor(() => window.PS?.room?.id?.startsWith('team-') && document.querySelector('.teameditor'), 'new team editor');'''
          new = '''\t\tclick(document.querySelector('#room-teambuilder button[data-cmd="/newteam"]'));
\t\tconst teamLink = await waitFor(
\t\t\t() => document.querySelector('#room-teambuilder a.team[href^="team-"]'),
\t\t\t'new team link'
\t\t);
\t\tclick(teamLink);
\t\tawait waitFor(() => window.PS?.room?.editor && document.querySelector('.teameditor'), 'new team editor');'''
          if old not in text:
              if new in text:
                  raise SystemExit(0)
              raise SystemExit('expected new-team block was not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/smoke-japanese-teambuilder.mjs
          git commit -m "Open newly created team in browser smoke"
          git push origin HEAD:agent/japanese-teambuilder

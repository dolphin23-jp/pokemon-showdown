name: Patch Teambuilder search click

on:
  push:
    branches:
      - agent/japanese-teambuilder

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/japanese-teambuilder
          fetch-depth: 0
      - name: Prevent search-link navigation
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/smoke-japanese-teambuilder.mjs')
          text = path.read_text(encoding='utf-8')
          old = "\t\t\tclick(result);\n"
          new = (
              "\t\t\tresult.addEventListener('click', event => event.preventDefault(), { once: true });\n"
              "\t\t\tclick(result);\n"
          )
          if text.count(old) != 1:
              if new not in text:
                  raise SystemExit(f'expected one search-result click, found {text.count(old)}')
          else:
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit patch and remove helper workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/patch-teambuilder-search-click.yml
          git add scripts/smoke-japanese-teambuilder.mjs
          git commit -m "Prevent Teambuilder search link navigation"
          git push origin HEAD:agent/japanese-teambuilder

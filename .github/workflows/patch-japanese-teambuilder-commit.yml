name: Patch Japanese Teambuilder commit flow

on:
  push:
    branches:
      - agent/japanese-teambuilder

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/japanese-teambuilder
      - name: Commit fields through blur
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/smoke-japanese-teambuilder.mjs')
          text = path.read_text(encoding='utf-8')
          old = '''\t\tconst choose = async (focus, query, expectedCanonical, entrySelector) => {
\t\t\tlet input = await waitFor(
\t\t\t\t() => document.querySelector('.team-focus-editor input.set-field[data-focus="' + focus + '"]') ||
\t\t\t\t\tdocument.querySelector('.teameditor input.set-field[data-focus="' + focus + '"]'),
\t\t\t\tfocus + ' input'
\t\t\t);
\t\t\tinput.focus();
\t\t\tawait delay(120);
\t\t\tinput = document.querySelector('.team-focus-editor input.set-field[data-focus="' + focus + '"]') || input;
\t\t\tsetInputValue(input, query);
\t\t\tconst result = await waitFor(() => document.querySelector(entrySelector), entrySelector + ' result');
\t\t\tclick(result);
\t\t\tawait waitFor(() => {
\t\t\t\tconst set = window.PS?.room?.editor?.sets?.[0];
\t\t\t\tif (!set) return false;
\t\t\t\tif (focus.endsWith('-pokemon')) return set.species === expectedCanonical;
\t\t\t\tif (focus.endsWith('-ability')) return set.ability === expectedCanonical;
\t\t\t\tif (focus.endsWith('-item')) return set.item === expectedCanonical;
\t\t\t\tif (focus.endsWith('-move-0')) return set.moves?.[0] === expectedCanonical;
\t\t\t\treturn false;
\t\t\t}, focus + ' canonical model value');
\t\t\tawait delay(120);
\t\t};'''
          new = '''\t\tconst choose = async (focus, query, expectedCanonical) => {
\t\t\tlet input = await waitFor(
\t\t\t\t() => document.querySelector('.team-focus-editor input.set-field[data-focus="' + focus + '"]') ||
\t\t\t\t\tdocument.querySelector('.teameditor input.set-field[data-focus="' + focus + '"]'),
\t\t\t\tfocus + ' input'
\t\t\t);
\t\t\tinput.focus();
\t\t\tawait delay(120);
\t\t\tinput = document.querySelector('.team-focus-editor input.set-field[data-focus="' + focus + '"]') || input;
\t\t\tsetInputValue(input, query);
\t\t\tawait delay(120);
\t\t\tinput.blur();
\t\t\tawait waitFor(() => {
\t\t\t\tconst set = window.PS?.room?.editor?.sets?.[0];
\t\t\t\tif (!set) return false;
\t\t\t\tif (focus.endsWith('-pokemon')) return set.species === expectedCanonical;
\t\t\t\tif (focus.endsWith('-ability')) return set.ability === expectedCanonical;
\t\t\t\tif (focus.endsWith('-item')) return set.item === expectedCanonical;
\t\t\t\tif (focus.endsWith('-move-0')) return set.moves?.[0] === expectedCanonical;
\t\t\t\treturn false;
\t\t\t}, focus + ' canonical model value');
\t\t\tawait delay(200);
\t\t};'''
          if old not in text:
              if new not in text:
                  raise SystemExit('expected choose function was not found')
          else:
              text = text.replace(old, new, 1)
          calls = {
              "await choose('set-0-pokemon', 'Pikachu', 'Pikachu', 'a[data-entry^=\"pokemon|Pikachu\"]');": "await choose('set-0-pokemon', 'Pikachu', 'Pikachu');",
              "await choose('set-0-ability', 'Static', 'Static', 'a[data-entry^=\"ability|Static\"]');": "await choose('set-0-ability', 'Static', 'Static');",
              "await choose('set-0-item', 'Light Ball', 'Light Ball', 'a[data-entry^=\"item|Light Ball\"]');": "await choose('set-0-item', 'Light Ball', 'Light Ball');",
              "await choose('set-0-move-0', 'Thunderbolt', 'Thunderbolt', 'a[data-entry^=\"move|Thunderbolt\"]');": "await choose('set-0-move-0', 'Thunderbolt', 'Thunderbolt');",
          }
          for before, after in calls.items():
              if before in text:
                  text = text.replace(before, after, 1)
              elif after not in text:
                  raise SystemExit(f'expected call was not found: {before}')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/smoke-japanese-teambuilder.mjs
          git commit -m "Commit Teambuilder fields through blur"
          git push origin HEAD:agent/japanese-teambuilder

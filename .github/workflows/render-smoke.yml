name: Render smoke test

on:
  pull_request:
    paths:
      - Dockerfile
      - render.yaml
      - config/custom-formats.ts
      - config/pokemon-showdown-client.json
      - config/all-generations-fallback/**
      - config/bss-engine-boundary-bot.txt
      - config/bss-smoke-opponent.txt
      - config/bss-faint-smoke-opponent.txt
      - scripts/**
      - .github/workflows/render-smoke.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Record Phase 1 baseline invariants
        run: |
          python3 scripts/check-phase1-baseline.py \
            --base-ref "${{ github.base_ref }}" \
            --output /tmp/phase1-baseline.json
          cat /tmp/phase1-baseline.json
      - name: Verify pinned client fork and commit
        run: |
          python3 scripts/check-pinned-client.py \
            --verify-remote \
            --output /tmp/client-pin.json
          cat /tmp/client-pin.json
      - name: Build Render image with captured output
        shell: bash
        run: |
          set +e
          docker build --progress=plain --tag pokemon-showdown-ai:smoke . > /tmp/docker-build.log 2>&1
          build_status=$?
          echo "$build_status" > /tmp/docker-build.status
          tail -n 300 /tmp/docker-build.log
          exit 0
      - name: Upload Docker build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-diagnostics
          path: |
            /tmp/docker-build.log
            /tmp/docker-build.status
      - name: Require Docker image to build
        run: test "$(cat /tmp/docker-build.status)" = 0
      - name: Verify embedded pinned client build
        run: |
          docker run --rm --entrypoint python3 pokemon-showdown-ai:smoke \
            /app/scripts/check-built-client.py \
              --client-root /opt/pokemon-showdown-client \
              --pin-file /app/config/pokemon-showdown-client.json \
            > /tmp/client-build-verification.json
          cat /tmp/client-build-verification.json
          docker run --rm --entrypoint cat pokemon-showdown-ai:smoke \
            /opt/pokemon-showdown-client/build-manifest.json \
            > /tmp/client-build-manifest.json
      - name: Verify duplicate protocol and rendered-text invariants
        run: |
          docker run --rm --entrypoint node pokemon-showdown-ai:smoke \
            /app/scripts/test-japanese-protocol-invariants.js \
              --client-root /opt/pokemon-showdown-client \
            > /tmp/protocol-render-invariants.json
          cat /tmp/protocol-render-invariants.json

      - name: Start poke-engine boundary container
        run: |
          docker run --detach --name showdown-engine-boundary \
            -p 10002:10000 \
            -e PORT=10000 \
            -e DEFAULT_PLAYER_NAME=EngineBoundarySmoke \
            -e FOUL_PLAY_USERNAME=EngineBoundaryBot \
            -e FOUL_PLAY_TEAM_NAME=/app/config/bss-engine-boundary-bot.txt \
            -e FOUL_PLAY_SEARCH_TIME_MS=100 \
            -e FOUL_PLAY_TEAM_PREVIEW_SEARCH_TIME_MS=150 \
            -e FOUL_PLAY_POKE_ENGINE_BOUNDARY_LOG=/app/.runtime/poke-engine-boundary.jsonl \
            pokemon-showdown-ai:smoke
      - name: Wait for poke-engine boundary container
        run: |
          for attempt in $(seq 1 90); do
            if curl --fail --silent http://127.0.0.1:10002/health | grep -q 'gen9nationaldexallgenerationsbss'; then
              exit 0
            fi
            if ! docker inspect -f '{{.State.Running}}' showdown-engine-boundary | grep -q true; then
              exit 1
            fi
            sleep 2
          done
          exit 1
      - name: Verify poke-engine boundary bot identity
        run: |
          docker exec showdown-engine-boundary \
            .venv/bin/python scripts/check-showdown-user.py EngineBoundaryBot --port 8000 --timeout 30
      - name: Exercise Rust poke-engine ID boundary invariants
        shell: bash
        run: |
          set +e
          docker exec showdown-engine-boundary \
            .venv/bin/python scripts/smoke-bss-poke-engine-boundary-invariants.py \
              --bot EngineBoundaryBot --port 8000 --timeout 120 \
              --boundary-log /app/.runtime/poke-engine-boundary.jsonl \
              --output /app/.runtime/poke-engine-boundary-report.json \
            > /tmp/bss-poke-engine-boundary-invariants.log 2>&1
          smoke_status=$?
          echo "$smoke_status" > /tmp/bss-poke-engine-boundary-invariants.status
          docker cp showdown-engine-boundary:/app/.runtime/poke-engine-boundary.jsonl \
            /tmp/poke-engine-boundary.jsonl 2>/dev/null || true
          docker cp showdown-engine-boundary:/app/.runtime/poke-engine-boundary-report.json \
            /tmp/poke-engine-boundary-report.json 2>/dev/null || true
          docker logs --timestamps showdown-engine-boundary \
            > /tmp/poke-engine-boundary-container.log 2>&1 || true
          cat /tmp/bss-poke-engine-boundary-invariants.log
          exit 0
      - name: Upload poke-engine boundary diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bss-poke-engine-boundary-invariant-diagnostics
          path: |
            /tmp/bss-poke-engine-boundary-invariants.log
            /tmp/bss-poke-engine-boundary-invariants.status
            /tmp/poke-engine-boundary.jsonl
            /tmp/poke-engine-boundary-report.json
            /tmp/poke-engine-boundary-container.log
      - name: Cleanup poke-engine boundary container
        if: always()
        run: docker rm --force showdown-engine-boundary >/dev/null 2>&1 || true
      - name: Require Rust poke-engine ID boundary invariants
        run: test "$(cat /tmp/bss-poke-engine-boundary-invariants.status)" = 0

      - name: Start container
        run: |
          docker run --detach --name showdown-ai \
            -p 10000:10000 \
            -e PORT=10000 \
            -e ACCESS_TOKEN=test-access-token \
            -e DEFAULT_PLAYER_NAME=Dolphin23 \
            -e FOUL_PLAY_USERNAME=FoulPlayAI \
            -e FOUL_PLAY_TEAM_NAME=/app/config/all-generations-fallback/06-ghost-nightmare.txt \
            -e FOUL_PLAY_RAW_RECEIVE_LOG=/app/.runtime/foul-play-received.jsonl \
            pokemon-showdown-ai:smoke
      - name: Wait for health endpoint
        run: |
          for attempt in $(seq 1 90); do
            if curl --fail --silent http://127.0.0.1:10000/health | grep -q 'gen9nationaldexallgenerationsbss'; then
              exit 0
            fi
            if ! docker inspect -f '{{.State.Running}}' showdown-ai | grep -q true; then
              exit 1
            fi
            sleep 2
          done
          exit 1
      - name: Verify bot identity
        run: |
          docker exec showdown-ai \
            .venv/bin/python scripts/check-showdown-user.py FoulPlayAI --port 8000 --timeout 30
      - name: Exercise foul-play raw input invariants
        shell: bash
        run: |
          set +e
          docker exec showdown-ai \
            .venv/bin/python scripts/smoke-bss-foul-play-input-invariants.py \
              --bot FoulPlayAI --port 8000 --timeout 90 \
              --raw-log /app/.runtime/foul-play-received.jsonl \
            > /tmp/bss-foul-play-input-invariants.log 2>&1
          smoke_status=$?
          echo "$smoke_status" > /tmp/bss-foul-play-input-invariants.status
          docker cp showdown-ai:/app/.runtime/foul-play-received.jsonl \
            /tmp/foul-play-received.jsonl 2>/dev/null || true
          cat /tmp/bss-foul-play-input-invariants.log
          exit 0
      - name: Upload foul-play input invariant diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bss-foul-play-input-invariant-diagnostics
          path: |
            /tmp/bss-foul-play-input-invariants.log
            /tmp/bss-foul-play-input-invariants.status
            /tmp/foul-play-received.jsonl
      - name: Require foul-play input invariants
        run: test "$(cat /tmp/bss-foul-play-input-invariants.status)" = 0
      - name: Wait for bot after foul-play input battle
        run: sleep 3
      - name: Exercise raw WebSocket protocol invariants
        shell: bash
        run: |
          set +e
          docker exec showdown-ai \
            .venv/bin/python scripts/smoke-bss-protocol-invariants.py \
              --bot FoulPlayAI --port 8000 --timeout 90 \
            > /tmp/bss-protocol-invariants.log 2>&1
          smoke_status=$?
          echo "$smoke_status" > /tmp/bss-protocol-invariants.status
          cat /tmp/bss-protocol-invariants.log
          exit 0
      - name: Upload protocol invariant diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bss-protocol-invariant-diagnostics
          path: |
            /tmp/bss-protocol-invariants.log
            /tmp/bss-protocol-invariants.status
      - name: Require raw protocol invariants
        run: test "$(cat /tmp/bss-protocol-invariants.status)" = 0
      - name: Wait for bot after protocol invariant battle
        run: sleep 3
      - name: Exercise BSS battle with captured protocol
        shell: bash
        run: |
          set +e
          docker exec showdown-ai \
            .venv/bin/python scripts/smoke-bss-battle.py --bot FoulPlayAI --port 8000 --timeout 90 \
            > /tmp/bss-smoke.log 2>&1
          smoke_status=$?
          echo "$smoke_status" > /tmp/bss-smoke.status
          cat /tmp/bss-smoke.log
          exit 0
      - name: Upload BSS smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bss-smoke-diagnostics
          path: |
            /tmp/bss-smoke.log
            /tmp/bss-smoke.status
      - name: Require BSS battle to reach turn one
        run: test "$(cat /tmp/bss-smoke.status)" = 0
      - name: Wait for bot to accept another challenge
        run: sleep 3
      - name: Exercise faint and forced-switch recovery
        shell: bash
        run: |
          set +e
          docker exec showdown-ai \
            .venv/bin/python scripts/smoke-bss-faint-recovery.py \
              --bot FoulPlayAI --port 8000 --timeout 150 \
            > /tmp/bss-faint-smoke.log 2>&1
          smoke_status=$?
          echo "$smoke_status" > /tmp/bss-faint-smoke.status
          cat /tmp/bss-faint-smoke.log
          exit 0
      - name: Upload post-faint smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bss-faint-smoke-diagnostics
          path: |
            /tmp/bss-faint-smoke.log
            /tmp/bss-faint-smoke.status
      - name: Require replacement after a faint
        run: test "$(cat /tmp/bss-faint-smoke.status)" = 0
      - name: Verify access gate and pinned default client
        run: |
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:10000/)" = 401
          curl --fail --silent \
            --cookie-jar /tmp/showdown-ai.cookies \
            --data-urlencode 'key=test-access-token' \
            http://127.0.0.1:10000/access \
            --output /dev/null
          curl --fail --silent \
            --cookie /tmp/showdown-ai.cookies \
            http://127.0.0.1:10000/ \
            --output /tmp/authenticated-launcher.html
          grep -q 'National Dex All Generations BSS' /tmp/authenticated-launcher.html
          grep -q '名前を保存してShowdownを開く' /tmp/authenticated-launcher.html

          curl --fail --silent --dump-header /tmp/authenticated-client.headers \
            --cookie /tmp/showdown-ai.cookies \
            http://127.0.0.1:10000/client.html \
            --output /tmp/authenticated-client.html
          grep -qi '^x-pokemon-showdown-client-source: pinned-local' /tmp/authenticated-client.headers
          grep -q 'Config.defaultserver' /tmp/authenticated-client.html
          grep -q "prefix: '/showdown'" /tmp/authenticated-client.html
          grep -q "ps.send('/trn ' + cleaned + ',0,');" /tmp/authenticated-client.html
          grep -q "language: 'japanese'" /tmp/authenticated-client.html
          grep -q 'src="/config/config.js"' /tmp/authenticated-client.html
          grep -q 'Net.defaultRoute = location.origin' /tmp/authenticated-client.html
          ! grep -Eq '(src|href)="https://play\.pokemonshowdown\.com/' /tmp/authenticated-client.html

          curl --fail --silent --dump-header /tmp/client-main.headers \
            --cookie /tmp/showdown-ai.cookies \
            http://127.0.0.1:10000/js/client-main.js \
            --output /tmp/client-main.js
          grep -qi '^x-pokemon-showdown-client-source: pinned-local' /tmp/client-main.headers
          grep -qi '^cache-control: public, max-age=31536000, immutable' /tmp/client-main.headers
          test -s /tmp/client-main.js

          curl --fail --silent --dump-header /tmp/client-config.headers \
            --cookie /tmp/showdown-ai.cookies \
            http://127.0.0.1:10000/config/config.js \
            --output /tmp/client-config.js
          grep -qi '^x-pokemon-showdown-client-source: pinned-local' /tmp/client-config.headers
          grep -q 'Config.version' /tmp/client-config.js

          curl --fail --silent --dump-header /tmp/local-client-alias.headers \
            --cookie /tmp/showdown-ai.cookies \
            http://127.0.0.1:10000/local-client/testclient-new.html \
            --output /tmp/local-client-alias.html
          grep -qi '^x-pokemon-showdown-client-source: pinned-local' /tmp/local-client-alias.headers

          test "$(curl --path-as-is --silent --cookie /tmp/showdown-ai.cookies --output /tmp/client-traversal.txt --write-out '%{http_code}' http://127.0.0.1:10000/js/%2e%2e%2fpackage.json)" = 404
          test "$(curl --silent --cookie /tmp/showdown-ai.cookies --output /tmp/unknown-path.txt --write-out '%{http_code}' http://127.0.0.1:10000/not-a-client-resource.js)" = 404
          grep -q '^Not found\.$' /tmp/unknown-path.txt
      - name: Start unprotected visual baseline container
        run: |
          docker run --detach --name showdown-baseline \
            -p 10001:10000 \
            -e PORT=10000 \
            -e DEFAULT_PLAYER_NAME=Dolphin23 \
            -e FOUL_PLAY_USERNAME=BaselineBot \
            -e FOUL_PLAY_TEAM_NAME=/app/config/all-generations-fallback/06-ghost-nightmare.txt \
            pokemon-showdown-ai:smoke
          for attempt in $(seq 1 90); do
            if curl --fail --silent http://127.0.0.1:10001/health | grep -q 'gen9nationaldexallgenerationsbss'; then
              exit 0
            fi
            if ! docker inspect -f '{{.State.Running}}' showdown-baseline | grep -q true; then
              exit 1
            fi
            sleep 2
          done
          exit 1
      - name: Install Japanese screenshot fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          fc-cache -f
      - name: Capture iPad-sized pinned-client baseline
        shell: bash
        run: |
          browser="$(command -v google-chrome || command -v chromium || command -v chromium-browser || true)"
          test -n "$browser"
          curl --fail --silent http://127.0.0.1:10001/ \
            --output /tmp/launcher-baseline.html
          curl --fail --silent http://127.0.0.1:10001/client.html \
            --output /tmp/client-baseline.html
          "$browser" \
            --headless=new --no-sandbox --disable-gpu --hide-scrollbars --no-proxy-server \
            --host-resolver-rules='MAP play.pokemonshowdown.com ~NOTFOUND' \
            --user-data-dir=/tmp/chrome-launcher-baseline \
            --window-size=1024,1366 \
            --virtual-time-budget=5000 \
            --screenshot=/tmp/phase1-launcher-ipad.png \
            http://127.0.0.1:10001/
          "$browser" \
            --headless=new --no-sandbox --disable-gpu --hide-scrollbars --no-proxy-server \
            --host-resolver-rules='MAP play.pokemonshowdown.com ~NOTFOUND' \
            --user-data-dir=/tmp/chrome-client-baseline \
            --window-size=1024,1366 \
            --virtual-time-budget=15000 \
            --screenshot=/tmp/phase1-client-ipad.png \
            http://127.0.0.1:10001/client.html
          test -s /tmp/phase1-launcher-ipad.png
          test -s /tmp/phase1-client-ipad.png
      - name: Upload Phase 1 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase1-localization-artifacts
          path: |
            /tmp/phase1-baseline.json
            /tmp/client-pin.json
            /tmp/client-build-verification.json
            /tmp/client-build-manifest.json
            /tmp/protocol-render-invariants.json
            /tmp/bss-poke-engine-boundary-invariants.log
            /tmp/bss-poke-engine-boundary-invariants.status
            /tmp/poke-engine-boundary.jsonl
            /tmp/poke-engine-boundary-report.json
            /tmp/bss-foul-play-input-invariants.log
            /tmp/bss-foul-play-input-invariants.status
            /tmp/foul-play-received.jsonl
            /tmp/bss-protocol-invariants.log
            /tmp/bss-protocol-invariants.status
            /tmp/authenticated-launcher.html
            /tmp/authenticated-client.headers
            /tmp/authenticated-client.html
            /tmp/client-main.headers
            /tmp/client-main.js
            /tmp/client-config.headers
            /tmp/client-config.js
            /tmp/local-client-alias.headers
            /tmp/local-client-alias.html
            /tmp/client-traversal.txt
            /tmp/unknown-path.txt
            /tmp/launcher-baseline.html
            /tmp/client-baseline.html
            /tmp/phase1-launcher-ipad.png
            /tmp/phase1-client-ipad.png
      - name: Cleanup visual baseline container
        if: always()
        run: docker rm --force showdown-baseline >/dev/null 2>&1 || true
      - name: Capture container diagnostics
        if: always()
        shell: bash
        run: |
          docker ps -a > /tmp/container-ps.txt 2>&1 || true
          docker inspect showdown-ai > /tmp/container-inspect.json 2>&1 || true
          docker logs --timestamps showdown-ai > /tmp/container.log 2>&1 || true
          cat /tmp/container-ps.txt
          tail -n 450 /tmp/container.log || true
      - name: Upload container diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-diagnostics
          path: |
            /tmp/container-ps.txt
            /tmp/container-inspect.json
            /tmp/container.log

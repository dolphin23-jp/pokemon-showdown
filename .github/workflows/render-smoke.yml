name: Render smoke test

on:
  pull_request:
    paths:
      - Dockerfile
      - render.yaml
      - config/custom-formats.ts
      - config/all-generations-fallback/**
      - scripts/**
      - .github/workflows/render-smoke.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Run repository checks with captured output
        id: repository-checks
        shell: bash
        run: |
          set +e
          npm ci > /tmp/repository-checks.log 2>&1
          install_status=$?
          if [ "$install_status" -eq 0 ]; then
            CI=true FILES="config/custom-formats.ts" SKIPSIMTESTS=true npm run full-test-ci >> /tmp/repository-checks.log 2>&1
            check_status=$?
          else
            check_status=$install_status
          fi
          echo "$check_status" > /tmp/repository-checks.status
          cat /tmp/repository-checks.log
          exit 0
      - name: Upload repository-check diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repository-checks
          path: |
            /tmp/repository-checks.log
            /tmp/repository-checks.status
      - name: Require repository checks to pass
        run: test "$(cat /tmp/repository-checks.status)" = 0
      - name: Build Render image
        run: docker build --tag pokemon-showdown-ai:smoke .
      - name: Start container
        run: |
          docker run --detach --name showdown-ai \
            -p 10000:10000 \
            -e PORT=10000 \
            -e ACCESS_TOKEN=test-access-token \
            -e DEFAULT_PLAYER_NAME=Dolphin23 \
            pokemon-showdown-ai:smoke
      - name: Wait for health endpoint
        run: |
          for attempt in $(seq 1 90); do
            if curl --fail --silent http://127.0.0.1:10000/health | grep -q 'gen9nationaldexallgenerationsbss'; then
              exit 0
            fi
            if ! docker inspect -f '{{.State.Running}}' showdown-ai | grep -q true; then
              docker logs showdown-ai
              exit 1
            fi
            sleep 2
          done
          docker logs showdown-ai
          exit 1
      - name: Verify access gate and authenticated launcher
        run: |
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:10000/)" = 401
          curl --fail --silent \
            --cookie-jar /tmp/showdown-ai.cookies \
            --data-urlencode 'key=test-access-token' \
            http://127.0.0.1:10000/access \
            --output /dev/null
          curl --fail --silent \
            --cookie /tmp/showdown-ai.cookies \
            http://127.0.0.1:10000/ \
            | grep -q 'National Dex All Generations BSS'
      - name: Show logs on failure
        if: failure()
        run: docker logs showdown-ai || true

name: Patch Teambuilder native selection

on:
  push:
    branches:
      - agent/japanese-teambuilder

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/japanese-teambuilder
          fetch-depth: 0
      - name: Use native search-result selection after focus transition
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/smoke-japanese-teambuilder.mjs')
          text = path.read_text(encoding='utf-8')

          text = text.replace(
              "\t\t\tresult.addEventListener('click', event => event.preventDefault(), { once: true });\n",
              "",
              1,
          )

          old_focus = '''\t\t\tinput.focus();
\t\t\tawait delay(120);
\t\t\tinput = document.querySelector('.team-focus-editor input.set-field[data-focus="' + focus + '"]') || input;'''
          new_focus = '''\t\t\tinput.focus();
\t\t\tconst expectedType = focus.split('-')[2];
\t\t\tawait waitFor(
\t\t\t\t() => window.PS?.room?.editor?.innerFocus?.type === expectedType,
\t\t\t\tfocus + ' search mode'
\t\t\t);
\t\t\tawait delay(120);
\t\t\tinput = document.querySelector('.team-focus-editor input.set-field[data-focus="' + focus + '"]') || input;'''
          if old_focus in text:
              text = text.replace(old_focus, new_focus, 1)
          elif new_focus not in text:
              raise SystemExit('focus transition block not found')

          old_ability = '''\t\tawait waitFor(
\t\t\t() => canonicalModelMatches('set-0-ability', 'Static'),
\t\t\t'default Static ability'
\t\t);'''
          new_ability = '''\t\tawait choose('set-0-ability', 'Static', 'Static', 'a[data-entry^="ability|Static"]');'''
          if old_ability in text:
              text = text.replace(old_ability, new_ability, 1)
          elif new_ability not in text:
              raise SystemExit('ability selection block not found')

          if "result.addEventListener('click', event => event.preventDefault()" in text:
              raise SystemExit('search-result preventDefault still present')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit patch and remove helper workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/patch-teambuilder-ability-selection.yml
          git add scripts/smoke-japanese-teambuilder.mjs
          git commit -m "Use native Teambuilder search result selection"
          git push origin HEAD:agent/japanese-teambuilder

name: Patch Teambuilder focus wait

on:
  push:
    branches:
      - agent/japanese-teambuilder

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/japanese-teambuilder
          fetch-depth: 0
      - name: Wait for field search mode
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/smoke-japanese-teambuilder.mjs')
          text = path.read_text(encoding='utf-8')
          old = '''\t\t\tinput.focus();
\t\t\tawait delay(120);
\t\t\tinput = document.querySelector('.team-focus-editor input.set-field[data-focus="' + focus + '"]') || input;'''
          new = '''\t\t\tinput.focus();
\t\t\tconst expectedType = focus.split('-')[2];
\t\t\tawait waitFor(
\t\t\t\t() => window.PS?.room?.editor?.innerFocus?.type === expectedType,
\t\t\t\tfocus + ' search mode'
\t\t\t);
\t\t\tawait delay(120);
\t\t\tinput = document.querySelector('.team-focus-editor input.set-field[data-focus="' + focus + '"]') || input;'''
          if text.count(old) != 1:
              if new not in text:
                  raise SystemExit(f'expected one focus block, found {text.count(old)}')
          else:
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit patch and remove helper workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/patch-teambuilder-focus-wait.yml
          git add scripts/smoke-japanese-teambuilder.mjs
          git commit -m "Wait for Teambuilder field search mode"
          git push origin HEAD:agent/japanese-teambuilder

name: Apply Phase 2 server dictionary patches

on:
  push:
    branches:
      - agent/phase2-server-dictionary-quality
    paths:
      - scripts/apply-phase2-server-dictionary-patches.py
      - scripts/audit-japanese-server-translations.js
      - scripts/smoke-japanese-server-dictionary.py
      - .github/workflows/apply-phase2-server-dictionary.yml
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase2-server-dictionary-quality
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply exact Phase 2 patches
        run: python3 scripts/apply-phase2-server-dictionary-patches.py
      - name: Generate complete prioritized inventory
        run: |
          node --check scripts/audit-japanese-server-translations.js
          python3 -m py_compile scripts/smoke-japanese-server-dictionary.py
          node scripts/audit-japanese-server-translations.js \
            --check-fixed \
            --json-output docs/localization/phase-2-server-translation-inventory.json \
            --markdown-output docs/localization/phase-2-server-translation-inventory.md
      - name: Commit generated Phase 2 changes
        run: |
          git diff --check
          git status --short
          test -n "$(git status --porcelain)"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            Dockerfile \
            .github/workflows/render-smoke.yml \
            server/chat-commands/core.ts \
            translations/japanese \
            docs/localization/phase-2-server-translation-inventory.json \
            docs/localization/phase-2-server-translation-inventory.md
          git commit -m "Apply Phase 2 Japanese server dictionary fixes"
          git push origin HEAD:agent/phase2-server-dictionary-quality

# This workflow is temporary and is removed after the generated commit lands.

name: Apply Phase 3 T3-05 server integration

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/phase3-t3-05-server-integration'
    runs-on: ubuntu-latest
    steps:
      - name: Check out server branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          path: server

      - name: Check out merged T3-05 client
        uses: actions/checkout@v4
        with:
          repository: dolphin23-jp/pokemon-showdown-client
          ref: 0e5715cc325796752d07e7ecd3fdd175ad8fc52b
          fetch-depth: 1
          path: client

      - name: Apply pin and inventory-generator integration
        run: |
          python3 server/scripts/apply-t3-05-server.py \
            --server-root server \
            --client-root client

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Regenerate and verify Phase 3 inventories
        run: |
          node server/scripts/generate-phase3-ui-chrome-inventory.mjs \
            --server-root server \
            --client-root client
          node server/scripts/generate-phase3-ui-chrome-inventory.mjs \
            --server-root server \
            --client-root client \
            --check
          node server/scripts/generate-phase3-battle-text-inventory.mjs \
            --server-root server \
            --client-root client \
            --check
          node server/scripts/check-phase3-battle-text-coverage.mjs \
            --server-root server \
            --client-root client

      - name: Run syntax and server tests
        run: |
          python3 -m py_compile server/scripts/apply-t3-05-server.py
          node --check server/scripts/generate-phase3-ui-chrome-inventory.mjs
          node --check server/scripts/smoke-japanese-battle-chrome.mjs
          npm test --prefix server

      - name: Audit protected paths
        working-directory: server
        run: |
          test -z "$(git diff --name-only master...HEAD -- data sim)"
          grep -q 'data-cmd' docs/localization/phase-3-t3-05-battle-chrome-apply.md
          grep -q '/choose' docs/localization/phase-3-t3-05-battle-chrome-apply.md
          grep -q '/team' docs/localization/phase-3-t3-05-battle-chrome-apply.md

      - name: Commit verified server integration
        working-directory: server
        shell: bash
        run: |
          rm .github/workflows/t3-05-server-apply.yml
          rm scripts/apply-t3-05-server.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            config/pokemon-showdown-client.json \
            docs/localization/phase-3-battle-text-inventory.json \
            docs/localization/phase-3-t3-05-battle-chrome-apply.md \
            docs/localization/phase-3-ui-chrome-inventory.md \
            scripts/generate-phase3-ui-chrome-inventory.mjs \
            scripts/smoke-japanese-battle-chrome.mjs \
            .github/workflows/japanese-battle-chrome.yml \
            .github/workflows/t3-05-server-apply.yml \
            scripts/apply-t3-05-server.py
          git commit -m "Pin Phase 3 T3-05 battle chrome"
          git push origin HEAD:${{ github.head_ref }}

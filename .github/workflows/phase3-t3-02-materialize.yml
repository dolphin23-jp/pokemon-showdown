name: Phase 3 T3-02 materialize

on:
  pull_request:
    paths:
      - config/pokemon-showdown-client.json
      - docs/localization/phase-3-t3-02-text-coverage-moves.md
      - .github/workflows/phase3-t3-02-materialize.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out server branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          path: server

      - name: Resolve pinned client
        id: client
        working-directory: server
        run: |
          echo "repository=$(node -p "require('./config/pokemon-showdown-client.json').fork_repository")" >> "$GITHUB_OUTPUT"
          echo "sha=$(node -p "require('./config/pokemon-showdown-client.json').commit")" >> "$GITHUB_OUTPUT"

      - name: Check out pinned client
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.client.outputs.repository }}
          ref: ${{ steps.client.outputs.sha }}
          fetch-depth: 1
          path: client

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Exclude non-BattleText nested metadata
        working-directory: server
        run: |
          node <<'NODE'
          const fs = require('fs');
          const file = 'scripts/generate-phase3-battle-text-inventory.mjs';
          let source = fs.readFileSync(file, 'utf8');
          const oldCode = "\t\t} else {\n\t\t\ttextEntry.add(key);\n\t\t}";
          const newCode = "\t\t} else if (!(nested instanceof Map)) {\n\t\t\ttextEntry.add(key);\n\t\t}";
          if (source.includes(oldCode)) {
            source = source.replace(oldCode, newCode);
            fs.writeFileSync(file, source);
          } else if (!source.includes(newCode)) {
            throw new Error('BattleText metadata correction marker not found');
          }
          NODE
          node --check scripts/generate-phase3-battle-text-inventory.mjs
          git add scripts/generate-phase3-battle-text-inventory.mjs
          if ! git diff --cached --quiet; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git commit -m "Exclude nested ruleset metadata from BattleText inventory"
          fi

      - name: Regenerate complete BattleText inventory
        working-directory: server
        run: |
          node scripts/generate-phase3-battle-text-inventory.mjs \
            --server-root . \
            --client-root ../client
          node <<'NODE'
          const fs = require('fs');
          const inventoryPath = 'docs/localization/phase-3-battle-text-inventory.json';
          const inventory = JSON.parse(fs.readFileSync(inventoryPath, 'utf8'));
          if (inventory.totalMissing !== 0 || Object.keys(inventory.byNamespace).length !== 0) {
            throw new Error(`Expected zero missing BattleText keys, got ${inventory.totalMissing}`);
          }
          const pin = require('./config/pokemon-showdown-client.json');
          const uiPath = 'docs/localization/phase-3-ui-chrome-inventory.md';
          let ui = fs.readFileSync(uiPath, 'utf8');
          const next = ui.replace(
            /^Generated from client SHA `[^`]+`\.$/m,
            `Generated from client SHA \`${pin.commit}\`.`
          );
          if (next === ui && !ui.includes(pin.commit)) throw new Error('UI inventory SHA line not found');
          fs.writeFileSync(uiPath, next);
          NODE
          git add docs/localization/phase-3-battle-text-inventory.json \
            docs/localization/phase-3-ui-chrome-inventory.md
          if ! git diff --cached --quiet; then
            git commit -m "Record complete Phase 3 BattleText coverage"
          fi

      - name: Verify committed Phase 3 inventories
        working-directory: server
        run: |
          node scripts/generate-phase3-battle-text-inventory.mjs \
            --server-root . \
            --client-root ../client \
            --check

      - name: Push materialized server state
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        working-directory: server
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if [ "$(git rev-list --count "origin/${HEAD_BRANCH}..HEAD")" -gt 0 ]; then
            git push origin "HEAD:${HEAD_BRANCH}"
          else
            echo "Server state already materialized."
          fi

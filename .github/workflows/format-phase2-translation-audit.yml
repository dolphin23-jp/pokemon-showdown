name: Format Phase 2 translation audit

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase2-server-dictionary-quality
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - name: Format and verify audit script
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/audit-japanese-server-translations.js')
          text = path.read_text(encoding='utf-8')
          marker = "'use strict';\n"
          replacement = "/* eslint-disable no-template-curly-in-string */\n\n'use strict';\n"
          if replacement not in text:
              if marker not in text:
                  raise SystemExit('Audit script strict-mode marker not found')
              text = text.replace(marker, replacement, 1)
              path.write_text(text, encoding='utf-8')
          PY
          npx eslint --fix scripts/audit-japanese-server-translations.js
          npx eslint --max-warnings 0 scripts/audit-japanese-server-translations.js
          node scripts/audit-japanese-server-translations.js \
            --check-fixed \
            --json-output /tmp/phase2-audit-after-format.json
      - name: Commit formatted script
        run: |
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/audit-japanese-server-translations.js
          git commit -m "Format Phase 2 translation audit"
          git push origin HEAD:agent/phase2-server-dictionary-quality
